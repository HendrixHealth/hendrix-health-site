<!doctype html>
<html lang="en-NZ">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page not found — Hendrix Health</title>
  <meta name="theme-color" content="#0F7C7B">
  <link rel="icon" href="assets/img/logo-hendrix.png" type="image/png">

  <script>
    try {
      if (sessionStorage.getItem('hh_seen') === '1') {
        document.documentElement.classList.add('reveals-off');
      }
      sessionStorage.setItem('hh_seen', '1');
    } catch (e) {}
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..600,30..100&family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="assets/css/site.css">
</head>
<body>
  <main style="min-height: 100vh; display: grid; place-items: center; padding: var(--s-7);">
    <div style="text-align: center; max-width: 480px;">
      <span class="eyebrow">404</span>
      <h1 style="font-size: clamp(2.5rem, 1.4rem + 4vw, 4rem); margin-bottom: var(--s-5);">We can't find that page.</h1>
      <p style="color: var(--ink-soft); font-size: var(--fs-md); margin-bottom: var(--s-6);">The link may be old, or the page may have moved. Head back to the home page.</p>
      <a href="index.html" class="btn btn--primary btn--lg">Back to home <span class="arrow">→</span></a>
    </div>
  </main>
</body>
</html>
